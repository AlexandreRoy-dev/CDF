name: Sync Centris listing images

on:
  schedule:
    # Daily at 08:00 Eastern (12:00 UTC during EDT, 13:00 UTC during EST)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      max_listings:
        description: Maximum number of listings to sync
        required: false
        default: "30"
        type: string
      delay_seconds:
        description: Delay between listing requests (seconds)
        required: false
        default: "2"
        type: string

permissions:
  contents: write

concurrency:
  group: centris-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync Centris galleries and social share images
        env:
          CENTRIS_BROKER_FEED_URL: ${{ secrets.CENTRIS_BROKER_FEED_URL }}
          CENTRIS_SEARCH_URL: ${{ vars.CENTRIS_SEARCH_URL }}
        run: |
          python scripts/centris_sync.py \
            --sync-registry \
            --max-listings "${{ github.event.inputs.max_listings || '30' }}" \
            --delay-seconds "${{ github.event.inputs.delay_seconds || '2' }}"

      - name: Commit and push updated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ src/assets/images/proprietes/

          if git diff --staged --quiet; then
            echo "No listing image changes to commit."
            exit 0
          fi

          git commit -m "chore: sync Centris listing galleries [skip ci]"
          git push
